version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: english-db
    restart: always
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: english_learning
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    container_name: english-redis
    restart: always

  backend:
    build: ./backend
    container_name: english-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/english_learning?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_DATA_REDIS_HOST=redis
      - AI_SERVICE_URL=http://host.docker.internal:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/data/uploads:/app/data/uploads
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    container_name: english-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
