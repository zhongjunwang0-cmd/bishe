name: ML deep-learning deploy check

on:
  push:
    paths:
      - 'ml/**'
      - 'ai-service/**'
      - '.github/workflows/ml-models.yml'
  pull_request:
    paths:
      - 'ml/**'
      - 'ai-service/**'
      - '.github/workflows/ml-models.yml'

jobs:
  train-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GRAMMAR_RULE_ONLY: '0'
      HF_HUB_DISABLE_TELEMETRY: '1'
      TRANSFORMERS_OFFLINE: '0'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            ml/requirements.txt
            ai-service/requirements.txt

      - name: Install ML dependencies
        run: pip install -r ml/requirements.txt

      - name: Train DKT + T5-GEC (required for production)
        working-directory: ml
        run: python scripts/run_train_dl.py

      - name: Verify deep-learning artifacts
        working-directory: ml
        run: python scripts/verify_dl_deploy.py

      - name: Install ai-service dependencies
        run: pip install -r ai-service/requirements.txt

      - name: Assert GRAMMAR_RULE_ONLY defaults to deep learning
        run: |
          python - <<'PY'
          import os
          os.environ.pop("GRAMMAR_RULE_ONLY", None)
          from pathlib import Path
          import importlib.util
          spec = importlib.util.spec_from_file_location(
              "grammar_engine",
              Path("ai-service/app/grammar_engine.py"),
          )
          mod = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)
          assert not mod._rule_only_mode(), "Default must be GRAMMAR_RULE_ONLY=0"
          print("Default GRAMMAR_RULE_ONLY=0 confirmed")
          PY
