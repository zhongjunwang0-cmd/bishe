spring:
  application:
    name: learning-system
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/english_learning?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
  main:
    banner-mode: off
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.english.learning.entity
  configuration:
    map-underline-to-camel-case: true

server:
  port: 8080

# Python ai-service (EdNet KT model, grammar, pronunciation)
ai:
  service:
    enabled: true
    base-url: ${AI_SERVICE_URL:http://localhost:8000}

logging:
  level:
    com.english.learning: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
